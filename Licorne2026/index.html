<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire Louise !</title>
    <style>
        /* Importation d'une jolie police */
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Image de fond */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('dog.jpg') no-repeat center center/cover;
            z-index: -1;
            filter: brightness(0.8);
        }

        /* Conteneur principal (Effet de verre) */
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            max-width: 500px;
            color: white;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #add8e6; /* Bleu clair */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        /* Bouton interactif */
        .btn-surprise {
            margin-top: 25px;
            padding: 12px 30px;
            background: #0077be;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.3s, background 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-surprise:hover {
            background: #00aaff;
            transform: scale(1.1);
        }

        /* Animation de flottement pour les petits coeurs bleus */
        .heart {
            position: absolute;
            color: #00d4ff;
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            animation: float 4s linear infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="card">
        <h1>Joyeux Anniversaire Louise !</h1>
        <p>Aujourd'hui est une journée spéciale, tout comme toi. 💙</p>
        <p>Que cette année soit remplie de bonheur, de rires et de moments inoubliables (et de beaucoup de chiens !).</p>
        
        <button class="btn-surprise" onclick="createHearts()">Clique pour une surprise !</button>
    </div>

    <script>
        function createHearts() {
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.innerHTML = '💙';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
                heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 4000);
            }
            alert("Passe une journée magique Louise ! ✨");
        }
    </script>
</body>
</html>
