<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire Louise</title>
    <style>
        /* Importation de polices douces et élégantes */
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Montserrat:wght@300;400&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Conteneur de l'image de fond avec animation douce */
        .bg-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-color: #000;
            overflow: hidden;
        }

        .bg-image {
            width: 100%;
            height: 100%;
            background: url('dog.jpg') no-repeat center center/cover;
            animation: slowZoom 20s infinite alternate;
        }

        /* Voile bleu très léger pour l'ambiance et la lisibilité */
        .blue-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(173, 216, 230, 0.2) 0%, rgba(25, 42, 86, 0.4) 100%);
            z-index: -1;
        }

        /* Cadre de texte minimaliste */
        .message-container {
            text-align: center;
            color: white;
            padding: 40px;
            max-width: 500px;
            /* On garde le fond très transparent pour voir le chien derrière */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            border-radius: 2px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: fadeIn 3s ease-out;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            margin: 0;
            color: #e0f2ff; /* Bleu très clair glacé */
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .divider {
            height: 1px;
            width: 60px;
            background: #add8e6;
            margin: 20px auto;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.8;
            font-weight: 300;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        .heart-icon {
            color: #add8e6;
            font-size: 1.5rem;
            display: block;
            margin-top: 10px;
        }

        /* Animations */
        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="bg-image"></div>
    </div>
    
    <div class="blue-overlay"></div>

    <div class="message-container">
        <h1>Louise</h1>
        <div class="divider"></div>
        <p>
            Il y a des sourires qui rendent la vie plus douce,<br> 
            et des regards qui disent tout sans un mot.<br>
            <br>
            Que cette nouvelle année t'apporte autant de joie<br>
            que celle que tu partages avec ceux que tu aimes.
        </p>
        <span class="heart-icon">💙</span>
    </div>

</body>
</html>
