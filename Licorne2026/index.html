<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pour Louise</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Quicksand:wght@300;400&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #f0f8ff;
        }

        /* Image de fond avec un voile bleu doux */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('dog.jpg') no-repeat center center/cover;
            z-index: -1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(173, 216, 230, 0.3); /* Voile bleu ciel très léger */
            backdrop-filter: grayscale(20%);
        }

        /* Carte centrale épurée */
        .content-box {
            background: rgba(255, 255, 255, 0.85);
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: fadeInOpacity 3s ease-in-out;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: #5d9cec; /* Bleu doux */
            margin: 0 0 20px 0;
        }

        .message {
            font-size: 1.3rem;
            color: #4a4a4a;
            line-height: 1.8;
            font-style: italic;
        }

        .divider {
            width: 50px;
            height: 2px;
            background-color: #add8e6;
            margin: 30px auto;
        }

        .signature {
            font-size: 1rem;
            letter-spacing: 2px;
            color: #88a3ba;
            text-transform: uppercase;
        }

        /* Animation d'apparition douce */
        @keyframes fadeInOpacity {
            0% { opacity: 0; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Petit effet de flottement léger */
        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div class="background-container">
        <div class="overlay"></div>
    </div>

    <div class="content-box floating">
        <h1>Joyeux Anniversaire Louise</h1>
        
        <div class="divider"></div>
        
        <p class="message">
            À celle qui illumine nos journées de sa douceur,<br>
            que cette année soit aussi belle et paisible <br>
            que les moments passés à tes côtés.
        </p>

        <p class="message" style="font-size: 1.1rem; margin-top: 15px;">
            Profite de chaque instant, de chaque rire,<br>
            et de tout l'amour qui t'entoure aujourd'hui.
        </p>

        <div class="divider"></div>

        <div class="signature">Avec toute mon affection 💙</div>
    </div>

</body>
</html>
