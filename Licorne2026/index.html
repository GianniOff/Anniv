<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pour Louise 🦄</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* L'image du chien en fond */
        .dog-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('dog.jpg') no-repeat center center/cover;
            z-index: -2;
            animation: slowScale 20s infinite alternate ease-in-out;
        }

        /* Le voile bleu pour l'ambiance */
        .blue-mist {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(135, 206, 235, 0.25); /* Bleu ciel transparent */
            z-index: -1;
        }

        /* La carte de message style "verre dépoli" */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            max-width: 400px;
            text-align: center;
            animation: slideUp 1.5s ease-out;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #4a90e2;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            color: #444;
            line-height: 1.6;
            margin: 15px 0;
        }

        .heart {
            color: #4a90e2;
            font-size: 1.8rem;
            margin-top: 10px;
            display: inline-block;
            animation: beat 1.5s infinite;
        }

        /* Animations */
        @keyframes slowScale {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="dog-background"></div>
    <div class="blue-mist"></div>

    <div class="glass-card">
        <h1>Louise</h1>
        <p>Coucou ma petite licorne 🦄,</p>
        <p>Je n'ai pas de vrai cadeau pour toi malheureusement...</p>
        <p>Donc mon seul cadeau est que <strong>je t'aime fort</strong> (en ami !).</p>
        <p>Joyeux Anniversaire !</p>
        <div class="heart">💙</div>
    </div>

</body>
</html>
