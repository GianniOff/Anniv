<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portrait de Mumu - Mode Cadeau</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff477e;
            --dark-pink: #d81b60;
            --gold: #ffc107;
            --gold-glow: rgba(255, 193, 7, 0.5);
            --bg-color: #ffe4e1;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            /* Effet papier cadeau à rayures diagonales */
            background-color: var(--bg-color);
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 20px,
                rgba(255, 255, 255, 0.6) 20px,
                rgba(255, 255, 255, 0.6) 40px
            );
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 40px;
            /* Ombre douce et bordure blanche pour faire ressortir la carte */
            box-shadow: 0 20px 50px rgba(216, 27, 96, 0.2);
            border: 4px solid white;
            max-width: 450px;
            width: 90%;
            position: relative;
            backdrop-filter: blur(5px);
        }

        /* Petit ruban décoratif en emoji via pseudo-element */
        .container::before {
            content: "🎀";
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3rem;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
        }

        h1 { 
            color: var(--primary-pink); 
            margin-bottom: 5px; 
            font-size: 2.8rem;
            text-shadow: 2px 2px 0px #ffd1dc;
            /* Animation de pulsation sur le titre */
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .info { 
            margin-bottom: 25px; 
            font-size: 1.1rem; 
            color: #555; 
            font-weight: 600;
            height: 1.2em; 
        }

        .slots {
            display: flex;
            justify-content: center;
            gap: 15px;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            padding: 25px 20px;
            border-radius: 25px;
            margin-bottom: 35px;
            /* Bordure dorée avec effet néon */
            border: 5px solid var(--gold);
            box-shadow: 0 0 20px var(--gold-glow), inset 0 10px 20px rgba(0,0,0,0.5);
        }

        .slot-window {
            width: 85px;
            height: 110px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            /* Ombre interne pour l'effet de profondeur de la machine */
            box-shadow: inset 0 8px 15px rgba(0,0,0,0.2), inset 0 -8px 15px rgba(0,0,0,0.1);
            border: 2px solid #e0e0e0;
        }

        /* Ajout d'une petite ombre portée sur les emojis pour les détacher du fond */
        .slot-window::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
        }

        .reel {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: absolute;
            width: 100%;
        }

        .item {
            height: 110px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            flex-shrink: 0;
            line-height: 110px;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.15));
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Bouton style Arcade/Jouet 3D */
        button {
            padding: 18px 32px;
            font-size: 1.3rem;
            font-weight: 700;
            font-family: 'Fredoka', sans-serif;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #spinBtn {
            background: linear-gradient(to bottom, #ff477e, #d81b60);
            color: white;
            /* Épaisseur du bouton 3D */
            box-shadow: 0 8px 0 #9e1346, 0 15px 20px rgba(216, 27, 96, 0.4);
            position: relative;
            top: 0;
        }

        #spinBtn:active:not(:disabled) {
            /* Effet bouton enfoncé */
            top: 8px;
            box-shadow: 0 0px 0 #9e1346, 0 5px 10px rgba(216, 27, 96, 0.4);
        }

        #spinBtn:disabled { 
            background: linear-gradient(to bottom, #dcdde1, #7f8fa6); 
            box-shadow: 0 8px 0 #353b48; 
            cursor: not-allowed;
            color: #f5f6fa;
            transform: none;
        }

        .link-back {
            color: var(--dark-pink);
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 10px;
            transition: color 0.3s;
            display: inline-block;
        }

        .link-back:hover {
            color: var(--primary-pink);
            transform: scale(1.05);
        }
        
        /* Petites étoiles animées en arrière-plan */
        .sparkle {
            position: absolute;
            font-size: 1.5rem;
            animation: float 3s ease-in-out infinite;
            z-index: -1;
            opacity: 0.7;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(20deg); }
        }

    </style>
</head>
<body>

    <div class="sparkle" style="top: 10%; left: 15%;">✨</div>
    <div class="sparkle" style="top: 20%; right: 15%; animation-delay: 1s;">🎉</div>
    <div class="sparkle" style="bottom: 15%; left: 20%; animation-delay: 0.5s;">🎈</div>
    <div class="sparkle" style="bottom: 25%; right: 20%; animation-delay: 1.5s;">🎁</div>

    <div class="container">
        <h1>Mumu 2026</h1>
        <p id="status" class="info">Découvre les surprises à l'intérieur ! 🎁</p>

        <div class="slots">
            <div class="slot-window"><div id="r1" class="reel"></div></div>
            <div class="slot-window"><div id="r2" class="reel"></div></div>
            <div class="slot-window"><div id="r3" class="reel"></div></div>
        </div>

        <div class="btn-group">
            <button id="spinBtn" onclick="jouer()">DÉBALLER !</button>
            <a href="https://giannioff.github.io/Anniv/Mumu2026/" class="link-back">⬅ Retour à la fête</a>
        </div>
    </div>

    <script>
        // La liste de tes emojis
        const trios = [
            ['🤶🏻', '🌺', '♉️'], 
            ['🥧', '🐬', '🕊️'],
            ['⚡', '🔁', '❤️']
        ];

        // La pioche pour éviter les doublons
        let triosDisponibles = [...trios]; 

        const reels = [document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3')];

        function init() {
            reels.forEach(r => {
                r.innerHTML = '<div class="item">❓</div>';
                r.style.transform = "translateY(0px)";
            });
            triosDisponibles = [...trios]; 
        }

        function jouer() {
            const btn = document.getElementById('spinBtn');
            const statusText = document.getElementById('status');
            
            btn.disabled = true;

            let resultat;
            let estLaFin = false;

            // Logique de pioche sans doublons
            if (triosDisponibles.length > 0) {
                const randomIndex = Math.floor(Math.random() * triosDisponibles.length);
                resultat = triosDisponibles[randomIndex];
                triosDisponibles.splice(randomIndex, 1);
            } else {
                resultat = ['F', 'I', 'N'];
                estLaFin = true;
            }

            reels.forEach((reel, i) => {
                const currentItems = reel.querySelectorAll('.item');
                const lastItemText = currentItems.length > 0 ? currentItems[currentItems.length - 1].innerHTML : '❓';

                let html = `<div class="item">${lastItemText}</div>`;
                
                // On génère le ruban
                const spinCount = 15 + (i * 5);
                for(let j=0; j<spinCount; j++) {
                    const randomTrio = trios[Math.floor(Math.random() * trios.length)];
                    html += `<div class="item">${randomTrio[i]}</div>`;
                }
                
                // Vrai résultat à la fin
                html += `<div class="item">${resultat[i]}</div>`;
                
                // Réinitialisation
                reel.style.transition = 'none';
                reel.style.transform = 'translateY(0px)';
                reel.innerHTML = html;

                void reel.offsetWidth; 

                // Lancement de l'animation avec un easing dynamique ("rebond" à la fin)
                const duration = 1.8 + (i * 0.5); 
                reel.style.transition = `transform ${duration}s cubic-bezier(0.25, 0.46, 0.45, 1.05)`;

                const stopPos = (spinCount + 1) * 110; // 110 est la nouvelle hauteur des items
                reel.style.transform = `translateY(-${stopPos}px)`;

                // Gestion du texte de fin
                if (i === 2) {
                    setTimeout(() => {
                        if (estLaFin) {
                            statusText.innerHTML = "C'est fini ! <strong>Joyeux Anniversaire !</strong> 🎂";
                            btn.textContent = "TERMINÉ";
                        } else if (triosDisponibles.length === 0) {
                            btn.disabled = false;
                            statusText.textContent = "Plus qu'une surprise à découvrir... ✨";
                            btn.textContent = "MOT DE LA FIN";
                        } else {
                            btn.disabled = false;
                            const s = triosDisponibles.length > 1 ? "s" : "";
                            statusText.textContent = `Encore ${triosDisponibles.length} cadeau${s} possible${s}...`;
                        }
                    }, duration * 1000 + 100); 
                }
            });
        }

        init();
    </script>
</body>
</html>
