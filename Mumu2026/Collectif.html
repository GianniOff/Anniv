<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire Mumu ❗​</title>
    <style>
        :root {
            --emoji-size: 80px;
            --trio-width: 260px; /* Largeur d'un groupe de 3 */
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 40px;
            color: #ffde59;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Le cadre qui cache ce qui dépasse */
        .window {
            width: var(--trio-width);
            height: 100px;
            border: 4px solid #ffde59;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(255, 222, 89, 0.3);
        }

        /* Le ruban qui contient tous les emojis */
        .ribbon {
            display: flex;
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            transition: transform 3s cubic-bezier(0.15, 0, 0.15, 1); /* Effet de freinage fluide */
            will-change: transform;
        }

        .trio {
            display: flex;
            align-items: center;
            justify-content: space-around;
            width: var(--trio-width);
            font-size: 3rem;
            flex-shrink: 0;
        }

        button {
            margin-top: 50px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #1a1a1a;
            background: #ffde59;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #fff;
            transform: scale(1.05);
        }

        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>✨ Portrait de [Prénom] ✨</h1>

    <div class="window">
        <div id="ribbon" class="ribbon">
            </div>
    </div>

    <button id="spinBtn" onclick="startScroll()">Lancer le défilé</button>

    <script>
        // --- TES COMBINAISONS D'EMOJIS (TRIOS) ---
        const mesTrios = [
            ['🍕', '🎮', '😴'],
            ['🎸', '🎧', '🤘'],
            ['✈️', '📸', '🌍'],
            ['📚', '☕', '🤓'],
            ['🔥', '😎', '👑'],
            ['🍔', '🍟', '🥤'],
            ['🎨', '🖌️', '🌈'],
            ['💻', '⚡', '🚀']
        ];

        const ribbon = document.getElementById('ribbon');
        const btn = document.getElementById('spinBtn');
        const trioWidth = 260; // Doit correspondre à --trio-width

        // On remplit le ruban avec beaucoup de trios pour l'effet de défilement
        function init() {
            // On répète la liste pour avoir de la longueur
            const fullList = [...mesTrios, ...mesTrios, ...mesTrios, ...mesTrios, ...mesTrios];
            
            fullList.forEach(trio => {
                const div = document.createElement('div');
                div.className = 'trio';
                div.innerHTML = `<span>${trio[0]}</span><span>${trio[1]}</span><span>${trio[2]}</span>`;
                ribbon.appendChild(div);
            });
        }

        let currentPosition = 0;

        function startScroll() {
            btn.disabled = true;

            // On choisit un index au hasard (pas trop au début pour que ça défile bien)
            const randomIndex = Math.floor(Math.random() * (mesTrios.length * 2)) + mesTrios.length;
            
            // Calcul du décalage (chaque index décale d'une largeur de trio)
            const offset = randomIndex * trioWidth;
            
            // Animation du ruban
            ribbon.style.transform = `translateX(-${offset}px)`;

            // Réinitialisation après l'animation pour pouvoir recommencer
            setTimeout(() => {
                btn.disabled = false;
            }, 3000);
        }

        init();
    </script>
</body>
</html>
