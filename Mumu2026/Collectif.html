<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portrait de Mumu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fdf0f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #4a4a4a;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }

        h1 { color: #d63384; margin-bottom: 10px; }
        .description { margin-bottom: 30px; font-style: italic; color: #888; }

        /* Slots */
        .slots {
            display: flex;
            justify-content: center;
            gap: 15px;
            background: #333;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 5px solid #ffc107;
        }

        .slot-window {
            width: 80px;
            height: 100px;
            background: white;
            border-radius: 10px;
            overflow: hidden; /* Cache les emojis qui défilent */
            position: relative;
        }

        .reel {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: absolute;
            width: 100%;
            top: 0;
            transition: top 0.5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .emoji-item {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            flex-shrink: 0;
        }

        /* Boutons */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .btn-spin {
            background: #d63384;
            color: white;
            box-shadow: 0 5px 0 #a02663;
        }

        .btn-spin:active { transform: translateY(3px); box-shadow: none; }
        .btn-spin:disabled { background: #ccc; box-shadow: none; cursor: wait; }

        .btn-back {
            background: transparent;
            color: #d63384;
            border: 2px solid #d63384;
            text-decoration: none;
            display: inline-block;
            font-size: 0.9rem;
        }

        /* Animation de rotation rapide */
        .spinning {
            animation: scrollDown 0.1s linear infinite;
        }

        @keyframes scrollDown {
            from { transform: translateY(0); }
            to { transform: translateY(-200px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ Les Facettes de Mumu ✨</h1>
        <p class="description">Chaque clic affiche 3 emojis qui la représentent !</p>

        <div class="slots">
            <div class="slot-window"><div id="reel1" class="reel"></div></div>
            <div class="slot-window"><div id="reel2" class="reel"></div></div>
            <div class="slot-window"><div id="reel3" class="reel"></div></div>
        </div>

        <div class="buttons">
            <button class="btn-spin" id="spinBtn" onclick="lancerDefilement()">DÉCOUVRIR</button>
            <a href="https://giannioff.github.io/Anniv/Mumu2026/" class="btn-back">⬅ Retour vers le site</a>
        </div>
    </div>

    <script>
        // --- TES TRIOS D'EMOJIS ---
        const collections = [
            ['🎨', '👩‍🎨', '🌈'],
            ['🍕', '🍷', '😋'],
            ['🎮', '🎧', '⚡'],
            ['✈️', '🌍', '📸'],
            ['🎂', '🎁', '🥳'],
            ['🐱', '🧶', '💖'],
            ['📖', '☕', '🕯️'],
            ['🏃‍♀️', '🔥', '💪']
        ];

        const reels = [
            document.getElementById('reel1'),
            document.getElementById('reel2'),
            document.getElementById('reel3')
        ];
        
        let dernierIndex = -1;

        // Préparation initiale des colonnes
        function initialiser() {
            reels.forEach(reel => {
                reel.innerHTML = '<div class="emoji-item">✨</div>';
            });
        }

        function lancerDefilement() {
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;

            // 1. Choisir un nouveau trio au hasard (différent du précédent)
            let index;
            do {
                index = Math.floor(Math.random() * collections.length);
            } while (index === dernierIndex);
            dernierIndex = index;
            
            const trioGagnant = collections[index];

            // 2. Lancer l'animation pour chaque colonne
            reels.forEach((reel, i) => {
                // On remplit la colonne avec plein d'emojis pour l'effet de vitesse
                let content = '';
                for(let j=0; j<10; j++) {
                    content += `<div class="emoji-item">${collections[Math.floor(Math.random()*collections.length)][i]}</div>`;
                }
                // On finit par l'emoji final
                content += `<div class="emoji-item">${trioGagnant[i]}</div>`;
                reel.innerHTML = content;
                
                // On ajoute la classe d'animation
                reel.classList.add('spinning');
            });

            // 3. Arrêt séquentiel (l'un après l'autre)
            reels.forEach((reel, i) => {
                setTimeout(() => {
                    reel.classList.remove('spinning');
                    // On place le ruban tout en bas sur le dernier emoji
                    const offset = (reel.children.length - 1) * 100;
                    reel.style.top = `-${offset}px`;

                    // Si c'est le dernier emoji, on réactive le bouton
                    if (i === 2) {
                        setTimeout(() => { btn.disabled = false; }, 500);
                    }
                }, 1000 + (i * 600)); // 1s pour le premier, 1.6s pour le 2e, 2.2s pour le 3e
            });
        }

        initialiser();
    </script>
</body>
</html>
