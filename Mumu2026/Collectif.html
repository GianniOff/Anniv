<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portrait de Mumu</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #fff5f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(214, 51, 132, 0.15);
            max-width: 450px;
            width: 90%;
        }

        h1 { color: #d63384; margin-bottom: 10px; }
        .info { margin-bottom: 25px; font-size: 0.95rem; color: #666; height: 1.2em; }

        .slots {
            display: flex;
            justify-content: center;
            gap: 12px;
            background: #222;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 4px solid #ffd700;
        }

        .slot-window {
            width: 80px;
            height: 100px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .reel {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: absolute;
            width: 100%;
            top: 0;
            transition: top 0.8s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .item {
            height: 100px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            flex-shrink: 0;
            /* Empêche les emojis de déborder ou de casser la ligne */
            line-height: 100px;
            overflow: hidden;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #spinBtn {
            background: #d63384;
            color: white;
            box-shadow: 0 4px 0 #a02663;
        }

        #spinBtn:disabled { 
            background: #bdc3c7; 
            box-shadow: none; 
            cursor: not-allowed;
            color: #7f8c8d;
        }

        .link-back {
            color: #d63384;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 10px;
        }

        .spinning {
            animation: scrollLoop 0.1s linear infinite;
        }

        @keyframes scrollLoop {
            from { transform: translateY(0); }
            to { transform: translateY(-200px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Mumu 2026 ✨</h1>
        <p id="status" class="info">Découvre les 3 emojis qui la représentent !</p>

        <div class="slots">
            <div class="slot-window"><div id="r1" class="reel"></div></div>
            <div class="slot-window"><div id="r2" class="reel"></div></div>
            <div class="slot-window"><div id="r3" class="reel"></div></div>
        </div>

        <div class="btn-group">
            <button id="spinBtn" onclick="jouer()">DÉCOUVRIR</button>
            <a href="https://giannioff.github.io/Anniv/Mumu2026/" class="link-back">⬅ Retour au site</a>
        </div>
    </div>

    <script>
        // Tes emojis mis à jour (le 1 a été remplacé par un emoji plus standard pour éviter les bugs d'affichage)
        const trios = [
            ['🤶🏻', '🌺', '♉️'], 
            ['🥧', '🐬', '🕊️'],
            ['⚡', '🔁', '❤️']
        ];

        let clics = 0;
        const maxClics = 4; 
        const reels = [document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3')];

        // Initialisation propre
        function init() {
            reels.forEach(r => {
                r.innerHTML = '<div class="item">❓</div>';
                r.style.top = "0px";
            });
        }

        function jouer() {
            const btn = document.getElementById('spinBtn');
            const statusText = document.getElementById('status');
            clics++;
            
            btn.disabled = true;
            let estLaFin = (clics >= maxClics);

            // Choix du résultat final
            const resultat = estLaFin ? ['F', 'I', 'N'] : trios[Math.floor(Math.random() * trios.length)];

            reels.forEach((reel, i) => {
                // On vide et on reconstruit le ruban
                let html = '';
                // On crée 15 items aléatoires pour l'effet visuel de défilement
                for(let j=0; j<15; j++) {
                    const randomTrio = trios[Math.floor(Math.random() * trios.length)];
                    html += `<div class="item">${randomTrio[i]}</div>`;
                }
                // On ajoute le résultat final à la toute fin du ruban
                html += `<div class="item">${resultat[i]}</div>`;
                
                reel.innerHTML = html;
                reel.classList.remove('spinning'); // Reset animation
                void reel.offsetWidth; // Force le refresh du DOM
                reel.style.top = "0px";
                reel.classList.add('spinning');
            });

            // Arrêt séquentiel
            reels.forEach((reel, i) => {
                setTimeout(() => {
                    reel.classList.remove('spinning');
                    // On calcule dynamiquement la position pour s'arrêter pile sur le dernier item
                    const totalItems = reel.querySelectorAll('.item').length;
                    const stopPos = (totalItems - 1) * 100;
                    reel.style.top = `-${stopPos}px`;

                    if (i === 2) {
                        setTimeout(() => {
                            if (estLaFin) {
                                statusText.textContent = "C'est fini ! Joyeux Anniversaire !";
                                btn.textContent = "TERMINÉ";
                            } else {
                                btn.disabled = false;
                                statusText.textContent = `Encore ${maxClics - clics} découvertes possibles...`;
                            }
                        }, 800);
                    }
                }, 1000 + (i * 600)); 
            });
        }

        init();
    </script>
</body>
</html>
