<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portrait de [Prénom]</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { color: #ff4757; margin-bottom: 5px; }
        p { color: #7f8c8d; margin-bottom: 25px; }

        .machine {
            display: flex;
            gap: 15px;
            justify-content: center;
            background: #2f3542;
            padding: 20px;
            border-radius: 15px;
        }

        .reel {
            width: 90px;
            height: 90px;
            background: #fff;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            transition: transform 0.1s;
        }

        button {
            margin-top: 30px;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            background: #2ed573;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #26af5f;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        /* Animation de rotation */
        .spinning {
            animation: bounce 0.15s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(-5px); filter: blur(2px); }
            to { transform: translateY(5px); filter: blur(0px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>C'est tout [Prénom] !</h1>
        <p>Clique pour voir un nouveau trait de sa personnalité</p>

        <div class="machine">
            <div id="r1" class="reel">✨</div>
            <div id="r2" class="reel">🎂</div>
            <div id="r3" class="reel">✨</div>
        </div>

        <button onclick="revealCombo()">DÉCOUVRIR</button>
    </div>

    <script>
        // --- VOS COMBINAISONS D'EMOJIS ---
        // Ajoutez ici autant de trios que vous voulez
        const collections = [
            ['🍕', '🎮', '😴'], // Le combo "Gamer"
            ['🎸', '🎧', '🤘'], // Le combo "Musique"
            ['✈️', '📸', '🌍'], // Le combo "Voyage"
            ['📚', '☕', '🤓'], // Le combo "Studieux"
            ['🔥', '😎', '👑'], // Le combo "Style"
            ['🍔', '🍟', '🥤']  // Le combo "Gourmand"
        ];

        let isSpinning = false;

        function revealCombo() {
            if (isSpinning) return;
            
            isSpinning = true;
            const reels = [document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3')];
            
            // On lance l'animation
            reels.forEach(r => r.classList.add('spinning'));

            setTimeout(() => {
                // On choisit un trio au hasard dans la liste
                const randomCombo = collections[Math.floor(Math.random() * collections.length)];
                
                // On les affiche un par un avec un petit décalage
                reels.forEach((reel, index) => {
                    setTimeout(() => {
                        reel.classList.remove('spinning');
                        reel.textContent = randomCombo[index];
                        
                        // Quand le dernier s'arrête
                        if (index === 2) isSpinning = false;
                    }, index * 300);
                });

            }, 1000);
        }
    </script>
</body>
</html>
