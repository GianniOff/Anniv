<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumu 2026 - Édition Prestige</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff477e;
            --dark-pink: #d81b60;
            --gold: #ffc107;
            --gold-glow: rgba(255, 193, 7, 0.6);
            --bg-color: #fff0f3;
            --glass: rgba(255, 255, 255, 0.85);
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.5) 0%, transparent 80%),
                repeating-linear-gradient(45deg, transparent, transparent 35px, rgba(255, 71, 126, 0.05) 35px, rgba(255, 71, 126, 0.05) 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
            overflow: hidden;
        }

        .ribbon-v { position: fixed; top: 0; left: 50%; width: 60px; height: 100%; background: var(--primary-pink); transform: translateX(-50%); z-index: -1; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .ribbon-h { position: fixed; top: 50%; left: 0; width: 100%; height: 60px; background: var(--dark-pink); transform: translateY(-50%); z-index: -1; box-shadow: 0 0 20px rgba(0,0,0,0.1); }

        .container {
            text-align: center;
            background: var(--glass);
            padding: 50px 30px;
            border-radius: 50px;
            box-shadow: 0 25px 50px -12px rgba(216, 27, 96, 0.3);
            border: 2px solid white;
            max-width: 480px;
            width: 90%;
            position: relative;
            backdrop-filter: blur(15px);
            z-index: 10;
        }

        .container::before {
            content: "🎁";
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4rem;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1));
        }

        h1 { 
            color: var(--dark-pink); 
            margin: 0 0 10px 0;
            font-size: 3rem;
            text-shadow: 2px 4px 0px rgba(255, 255, 255, 0.8);
            animation: floatTitle 3s ease-in-out infinite;
        }

        @keyframes floatTitle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .info { 
            margin-bottom: 30px; 
            font-size: 1.2rem; 
            color: #6a0d2f; 
            font-weight: 500;
            line-height: 1.4;
            height: 3em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slots-outer {
            background: linear-gradient(145deg, #333, #000);
            padding: 20px;
            border-radius: 35px;
            border: 6px solid var(--gold);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), 0 0 25px var(--gold-glow);
            margin-bottom: 35px;
            position: relative;
        }

        .slots {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .slot-window {
            width: 90px;
            height: 120px;
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.3);
            border: 1px solid #ddd;
        }

        .slot-window::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, transparent 50%, rgba(0,0,0,0.05) 100%);
            pointer-events: none;
            z-index: 5;
        }

        .reel {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: absolute;
            width: 100%;
        }

        .item {
            height: 120px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.8rem;
            flex-shrink: 0;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
        }

        button {
            padding: 20px 40px;
            font-size: 1.4rem;
            font-weight: 700;
            font-family: 'Fredoka', sans-serif;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #spinBtn {
            background: linear-gradient(135deg, #ff477e 0%, #d81b60 100%);
            color: white;
            box-shadow: 0 10px 0 #9e1346, 0 20px 30px rgba(216, 27, 96, 0.4);
            position: relative;
            top: 0;
        }

        #spinBtn:disabled { 
            background: #bdc3c7; 
            box-shadow: 0 8px 0 #7f8c8d; 
            color: #ecf0f1;
            top: 0;
            cursor: not-allowed;
        }

        .link-back {
            margin-top: 15px;
            color: var(--dark-pink);
            text-decoration: none;
            font-weight: 600;
            opacity: 0.7;
            transition: 0.3s;
            font-size: 1rem;
            display: inline-block;
        }

        .sparkle {
            position: absolute;
            pointer-events: none;
            animation: sparkleAnim 4s linear infinite;
            z-index: 1;
        }

        @keyframes sparkleAnim {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="ribbon-v"></div>
    <div class="ribbon-h"></div>

    <div class="container">
        <h1>Mumu 2026</h1>
        
        <p id="status" class="info">Appuie pour découvrir les facettes <br>de ta personnalité ! ✨</p>

        <div class="slots-outer">
            <div class="slots">
                <div class="slot-window"><div id="r1" class="reel"></div></div>
                <div class="slot-window"><div id="r2" class="reel"></div></div>
                <div class="slot-window"><div id="r3" class="reel"></div></div>
            </div>
        </div>

        <div class="btn-group">
            <button id="spinBtn" onclick="jouer()">Ouvrir le cadeau !</button><br>
            <a href="https://giannioff.github.io/Anniv/Mumu2026/" class="link-back">⬅ Retour à la fête</a>
        </div>
    </div>

    <script>
        const trios = [
            ['🤶🏻', '🌺', '♉️'], 
            ['🥧', '🐬', '🕊️'],
            ['⚡', '🔁', '❤️'],
            ['🤶🏼', '🥧', '🐥'],
            ['😘', '🥰', '❤️'],
            ['🐦', '😽', '🛒 '],
            ['🤶🏼', '🥧', '🐥']
        ];

        let triosDisponibles = [...trios]; 
        const reels = [document.getElementById('r1'), document.getElementById('r2'), document.getElementById('r3')];

        function init() {
            reels.forEach(r => {
                r.innerHTML = '<div class="item">❓</div>';
                r.style.transform = "translateY(0px)";
            });
            triosDisponibles = [...trios]; 
        }

        function createSparkle() {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.innerHTML = '✨';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.fontSize = (Math.random() * 20 + 10) + 'px';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 4000);
        }
        setInterval(createSparkle, 600);

        function jouer() {
            const btn = document.getElementById('spinBtn');
            const statusText = document.getElementById('status');
            btn.disabled = true;

            let resultat;
            let estLaFin = false;

            if (triosDisponibles.length > 0) {
                const randomIndex = Math.floor(Math.random() * triosDisponibles.length);
                resultat = triosDisponibles[randomIndex];
                triosDisponibles.splice(randomIndex, 1);
            } else {
                resultat = ['F', 'I', 'N'];
                estLaFin = true;
            }

            reels.forEach((reel, i) => {
                const currentItems = reel.querySelectorAll('.item');
                const lastItemText = currentItems.length > 0 ? currentItems[currentItems.length - 1].innerHTML : '❓';

                let html = `<div class="item">${lastItemText}</div>`;
                const spinCount = 20 + (i * 8); 

                for(let j=0; j<spinCount; j++) {
                    const randomTrio = trios[Math.floor(Math.random() * trios.length)];
                    html += `<div class="item">${randomTrio[i]}</div>`;
                }
                
                html += `<div class="item">${resultat[i]}</div>`;
                
                reel.style.transition = 'none';
                reel.style.transform = 'translateY(0px)';
                reel.innerHTML = html;

                void reel.offsetWidth; 

                const duration = 2 + (i * 0.6); 
                reel.style.transition = `transform ${duration}s cubic-bezier(0.15, 0, 0.15, 1.02)`;
                const stopPos = (spinCount + 1) * 120;
                reel.style.transform = `translateY(-${stopPos}px)`;

                if (i === 2) {
                    setTimeout(() => {
                        if (estLaFin) {
                            statusText.innerHTML = "<strong>Merveilleux Anniversaire Mumu !</strong> 🎂⭐";
                            btn.textContent = "TERMINÉ";
                        } else {
                            btn.disabled = false;
                            // Suppression du message "Encore X secrets..." ici
                            if(triosDisponibles.length === 0) btn.textContent = "Dernière surprise !";
                        }
                    }, duration * 1000 + 200); 
                }
            });
        }

        init();
    </script>
</body>
</html>
